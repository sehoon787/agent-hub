name: Auto-Collect Agents

on:
  schedule:
    - cron: '0 0 */3 * *'  # Every 3 days at 00:00 UTC
  workflow_dispatch:       # Manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Call collect API
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL || 'https://agent-hub-omega.vercel.app' }}/api/collect"
