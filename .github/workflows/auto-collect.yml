name: Auto-Collect Agents

on:
  schedule:
    - cron: '0 0 */3 * *'  # Every 3 days at 00:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/collect.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/lib/data/agents.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: auto-collect new agents'
          title: '[Auto-Collect] New agents discovered'
          body: |
            Automated collection found new agents from monitored repositories.

            **Repos scanned:**
            - anthropics/claude-code
            - Yeachan-Heo/oh-my-claudecode
            - wshobson/agents

            Please review the new entries before merging.
          branch: auto-collect/update
          labels: auto-collect
          delete-branch: true
