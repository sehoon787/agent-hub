name: Process Agent Submission

on:
  schedule:
    - cron: '0 0,12 * * *'  # Twice daily at 00:00 and 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Determine submission to process
        id: submission
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL not configured"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm init -y > /dev/null 2>&1
          npm install @neondatabase/serverless > /dev/null 2>&1

          RESULT=$(node -e "
            const { neon } = require('@neondatabase/serverless');
            const sql = neon(process.env.DATABASE_URL);
            sql\`
              SELECT s.id, s.slug, s.name, s.display_name, s.description, s.long_description,
                     s.category, s.model, s.platform, s.author, s.github_url,
                     s.install_command, s.capabilities, s.tools, s.tags
              FROM submissions s
              WHERE s.status = 'approved'
              ORDER BY s.updated_at ASC
              LIMIT 1
            \`.then(rows => {
              if (rows.length === 0) {
                console.log(JSON.stringify({ skip: true }));
              } else {
                console.log(JSON.stringify({ skip: false, ...rows[0] }));
              }
            }).catch(err => {
              console.error(err);
              process.exit(1);
            });
          ")

          SKIP=$(echo "$RESULT" | jq -r '.skip')
          if [ "$SKIP" = "true" ]; then
            echo "No pending approved submissions found"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "submission_data=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Skip if no pending submissions
        if: steps.submission.outputs.skip == 'true'
        run: echo "No pending submissions, exiting cleanly"

      - name: Checkout
        if: steps.submission.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.submission.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.submission.outputs.skip != 'true'
        run: npm ci

      - name: Parse submission and create agent entry
        if: steps.submission.outputs.skip != 'true'
        env:
          SUBMISSION_DATA: ${{ steps.submission.outputs.submission_data }}
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(process.env.SUBMISSION_DATA);

            const { id, slug: dbSlug, name, display_name, description, long_description,
                    category, model, platform, author, github_url,
                    install_command, capabilities, tools, tags } = data;

            const displayName = display_name;

            // Validate required fields
            const validCategories = ['orchestrator', 'specialist', 'worker', 'analyst'];
            const validModels = ['opus', 'sonnet', 'haiku', 'gemini-2.5-pro', 'gemini-2.5-flash', 'gpt-5.4', 'gpt-5.4-mini', 'custom'];
            const validPlatforms = ['claude', 'gemini', 'codex', 'cursor', 'windsurf', 'aider', 'universal'];

            const errors = [];
            if (!name || name.length < 2) errors.push('Invalid name');
            if (!displayName) errors.push('Missing displayName');
            if (!description || description.length < 10) errors.push('Description too short');
            if (!validCategories.includes(category.toLowerCase())) errors.push('Invalid category: ' + category);
            if (!validModels.includes(model.toLowerCase())) errors.push('Invalid model: ' + model);
            if (!validPlatforms.includes(platform.toLowerCase())) errors.push('Invalid platform: ' + platform);

            // Security check
            const allText = [name, displayName, description, long_description, github_url, capabilities, tools, tags].join(' ');
            const dangerousPatterns = [
              /eval\\s*\\(/i, /exec\\s*\\(/i, /child_process/i, /require\\s*\\(\\s*['\"]fs['\"]/i,
              /process\\.env/i, /<script/i, /javascript:/i, /on(load|error|click)\\s*=/i,
              /dangerouslySetInnerHTML/i, /data:/i, /<svg/i, /<iframe/i
            ];
            for (const pattern of dangerousPatterns) {
              if (pattern.test(allText)) {
                errors.push('Security: detected suspicious pattern ' + pattern.source);
              }
            }

            if (errors.length > 0) {
              console.error('Validation errors:', errors.join(', '));
              process.exit(1);
            }

            // Create slug
            const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

            // Read existing agents
            const agents = JSON.parse(fs.readFileSync('src/lib/data/agents.json', 'utf8'));
            if (agents.some(a => a.slug === slug)) {
              console.error('Agent with slug ' + slug + ' already exists');
              process.exit(1);
            }

            // Use install command from DB or generate one
            let installCommand = install_command || '';
            if (!installCommand && github_url && github_url.includes('/blob/')) {
              var blobMatch = github_url.match(/github\\.com\\/([^/]+)\\/([^/]+)\\/blob\\/([^/]+)\\/(.+)/);
              if (blobMatch) installCommand = 'curl -o ~/.claude/agents/' + slug + '.md https://raw.githubusercontent.com/' + blobMatch[1] + '/' + blobMatch[2] + '/' + blobMatch[3] + '/' + blobMatch[4];
            }
            if (!installCommand && platform.toLowerCase() === 'claude' && github_url) {
              var m = github_url.match(/github\\.com\\/([^/]+)\\/([^/]+)/);
              if (m) installCommand = 'curl -o ~/.claude/agents/' + slug + '.md https://raw.githubusercontent.com/' + m[1] + '/' + m[2] + '/main/agents/' + slug + '.md';
            }

            const today = new Date().toISOString().split('T')[0];
            const newAgent = {
              slug,
              name: name.toLowerCase().replace(/[^a-z0-9_-]/g, '_'),
              displayName,
              description,
              longDescription: long_description || '',
              category: category.toLowerCase(),
              model: model.toLowerCase(),
              source: 'community',
              platform: platform.toLowerCase(),
              author,
              githubUrl: github_url || '',
              installCommand: installCommand || '',
              capabilities: capabilities ? capabilities.split(',').map(s => s.trim()).filter(Boolean) : [],
              tools: tools ? tools.split(',').map(s => s.trim()).filter(Boolean) : [],
              tags: tags ? tags.split(',').map(s => s.trim()).filter(Boolean) : [],
              createdAt: today,
              updatedAt: today,
              stars: 0,
              forks: 0,
              featured: false,
              verified: false
            };

            agents.push(newAgent);
            fs.writeFileSync('src/lib/data/agents.json', JSON.stringify(agents, null, 2) + '\\n');
            console.log('Added agent: ' + slug + ' (submission #' + id + ')');
          "

      - name: Create Pull Request
        if: steps.submission.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        env:
          SUBMISSION_DATA: ${{ steps.submission.outputs.submission_data }}
        with:
          commit-message: "feat: add community agent from submission #${{ fromJson(steps.submission.outputs.submission_data).id }}"
          title: "[Agent] Add from submission #${{ fromJson(steps.submission.outputs.submission_data).id }}"
          body: |
            Adds a community-submitted agent.

            **Submitted by:** @${{ fromJson(steps.submission.outputs.submission_data).author }}
            **Display Name:** ${{ fromJson(steps.submission.outputs.submission_data).display_name }}

            > This agent is added with `verified: false` and `source: 'community'`.
            > Review the changes to `agents.json` before merging.
          branch: "agent/submission-${{ fromJson(steps.submission.outputs.submission_data).id }}"
          labels: agent-submission
          delete-branch: true

      - name: Update DB status
        if: steps.submission.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUBMISSION_ID: ${{ fromJson(steps.submission.outputs.submission_data).id }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            node -e "
              const { neon } = require('@neondatabase/serverless');
              const sql = neon(process.env.DATABASE_URL);
              sql\`UPDATE submissions SET status = 'listed', updated_at = NOW() WHERE id = \${Number(process.env.SUBMISSION_ID)}\`.then(() => {
                console.log('DB status updated to listed');
              }).catch(err => {
                console.error('Failed to update DB:', err);
              });
            "
          fi
