name: Process Agent Submission

on:
  issues:
    types: [labeled]
  schedule:
    - cron: '0 0,12 * * *'  # Twice daily at 00:00 and 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  create-pr:
    # For label events: only when 'approved' label added to 'agent-submission' issues
    # For schedule/dispatch: always run (early-exit check inside)
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'approved' && contains(github.event.issue.labels.*.name, 'agent-submission'))
    runs-on: ubuntu-latest
    steps:
      - name: Determine issue to process
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "author=${{ github.event.issue.user.login }}" >> "$GITHUB_OUTPUT"
            echo "sender=${{ github.event.sender.login }}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            # Scheduled/manual: find first pending approved submission
            ISSUE=$(gh api "repos/${{ github.repository }}/issues?labels=approved,agent-submission&state=open&per_page=1" --jq '.[0] // empty')
            if [ -z "$ISSUE" ]; then
              echo "No pending submissions found"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "number=$(echo "$ISSUE" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "author=$(echo "$ISSUE" | jq -r '.user.login')" >> "$GITHUB_OUTPUT"
            echo "sender=github-actions[bot]" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if no pending submissions
        if: steps.issue.outputs.skip == 'true'
        run: echo "No pending submissions, exiting cleanly"

      - name: Verify approver permissions
        if: steps.issue.outputs.skip != 'true' && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENDER: ${{ steps.issue.outputs.sender }}
        run: |
          PERMISSION=$(gh api "repos/${{ github.repository }}/collaborators/$SENDER/permission" --jq '.permission')
          if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "maintain" && "$PERMISSION" != "write" ]]; then
            echo "ERROR: User $SENDER does not have sufficient permissions ($PERMISSION)"
            exit 1
          fi
          echo "Approved by $SENDER with $PERMISSION permission"

      - name: Checkout
        if: steps.issue.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.issue.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.issue.outputs.skip != 'true'
        run: npm ci

      - name: Fetch issue body
        if: steps.issue.outputs.skip != 'true'
        id: body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh api "repos/${{ github.repository }}/issues/${{ steps.issue.outputs.number }}" --jq '.body')
          echo "ISSUE_BODY<<HEREDOC_EOF" >> "$GITHUB_ENV"
          echo "$BODY" >> "$GITHUB_ENV"
          echo "HEREDOC_EOF" >> "$GITHUB_ENV"

      - name: Parse issue and create agent entry
        if: steps.issue.outputs.skip != 'true'
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_AUTHOR: ${{ steps.issue.outputs.author }}
        run: |
          node -e "
            const fs = require('fs');
            const body = process.env.ISSUE_BODY || '';

            // Parse **key:** value format from issue body
            function parseField(body, key) {
              const prefix = '**' + key + ':** ';
              const line = body.split('\\n').find(function(l) { return l.startsWith(prefix); });
              return line ? line.slice(prefix.length).trim() : '';
            }

            const name = parseField(body, 'name');
            const displayName = parseField(body, 'displayName');
            const description = parseField(body, 'description');
            const longDescription = parseField(body, 'longDescription');
            const category = parseField(body, 'category').toLowerCase();
            const model = parseField(body, 'model').toLowerCase();
            const platform = parseField(body, 'platform').toLowerCase();
            const author = parseField(body, 'author') || process.env.ISSUE_AUTHOR;
            const githubUrl = parseField(body, 'githubUrl');
            const capabilities = parseField(body, 'capabilities');
            const tools = parseField(body, 'tools');
            const tags = parseField(body, 'tags');

            const submittedBy = parseField(body, 'submittedBy');
            if (submittedBy && submittedBy !== process.env.ISSUE_AUTHOR) {
              console.error('submittedBy mismatch: body=' + submittedBy + ' author=' + process.env.ISSUE_AUTHOR);
              process.exit(1);
            }

            // Validate required fields
            const validCategories = ['orchestrator', 'specialist', 'worker', 'analyst'];
            const validModels = ['opus', 'sonnet', 'haiku', 'gemini-2.5-pro', 'gemini-2.5-flash', 'gpt-5.4', 'gpt-5.4-mini', 'custom'];
            const validPlatforms = ['claude', 'gemini', 'codex', 'cursor', 'windsurf', 'aider', 'universal'];

            const errors = [];
            if (!name || name.length < 2) errors.push('Invalid name');
            if (!displayName) errors.push('Missing displayName');
            if (!description || description.length < 10) errors.push('Description too short');
            if (!validCategories.includes(category)) errors.push('Invalid category: ' + category);
            if (!validModels.includes(model)) errors.push('Invalid model: ' + model);
            if (!validPlatforms.includes(platform)) errors.push('Invalid platform: ' + platform);

            // Security check — detect malicious patterns
            const allText = [name, displayName, description, longDescription, githubUrl, capabilities, tools, tags].join(' ');
            const dangerousPatterns = [
              /eval\s*\(/i, /exec\s*\(/i, /child_process/i, /require\s*\(\s*['\"]fs['\"]/i,
              /process\.env/i, /<script/i, /javascript:/i, /on(load|error|click)\s*=/i,
              /dangerouslySetInnerHTML/i, /data:/i, /<svg/i, /<iframe/i
            ];
            for (const pattern of dangerousPatterns) {
              if (pattern.test(allText)) {
                errors.push('Security: detected suspicious pattern ' + pattern.source);
              }
            }

            if (errors.length > 0) {
              console.error('Validation errors:', errors.join(', '));
              process.exit(1);
            }

            // Create slug
            const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-\$)/g, '');

            // Read existing agents
            const agents = JSON.parse(fs.readFileSync('src/lib/data/agents.json', 'utf8'));
            if (agents.some(a => a.slug === slug)) {
              console.error('Agent with slug ' + slug + ' already exists');
              process.exit(1);
            }

            const today = new Date().toISOString().split('T')[0];
            const newAgent = {
              slug,
              name: name.toLowerCase().replace(/[^a-z0-9_-]/g, '_'),
              displayName,
              description,
              longDescription: longDescription || '',
              category,
              model,
              source: 'community',
              platform,
              author,
              githubUrl: githubUrl || '',
              installCommand: (function() {
                var installCommand = parseField(body, 'installCommand');
                if (installCommand) return installCommand;
                if (githubUrl && githubUrl.includes('/blob/')) {
                  var blobMatch = githubUrl.match(/github\\.com\\/([^/]+)\\/([^/]+)\\/blob\\/([^/]+)\\/(.+)/);
                  if (blobMatch) return 'curl -o ~/.claude/agents/' + slug + '.md https://raw.githubusercontent.com/' + blobMatch[1] + '/' + blobMatch[2] + '/' + blobMatch[3] + '/' + blobMatch[4];
                }
                if (platform === 'claude' && githubUrl) {
                  var m = githubUrl.match(/github\\.com\\/([^/]+)\\/([^/]+)/);
                  if (m) return 'curl -o ~/.claude/agents/' + slug + '.md https://raw.githubusercontent.com/' + m[1] + '/' + m[2] + '/main/agents/' + slug + '.md';
                }
                return '';
              })(),
              capabilities: capabilities ? capabilities.split(',').map(s => s.trim()).filter(Boolean) : [],
              tools: tools ? tools.split(',').map(s => s.trim()).filter(Boolean) : [],
              tags: tags ? tags.split(',').map(s => s.trim()).filter(Boolean) : [],
              createdAt: today,
              updatedAt: today,
              stars: 0,
              forks: 0,
              featured: false,
              verified: false
            };

            agents.push(newAgent);
            fs.writeFileSync('src/lib/data/agents.json', JSON.stringify(agents, null, 2) + '\n');
            console.log('Added agent: ' + slug + ' (from issue #' + process.env.ISSUE_NUMBER + ')');
          "

      - name: Create Pull Request
        if: steps.issue.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat: add community agent from issue #${{ steps.issue.outputs.number }}"
          title: "[Agent] Add from issue #${{ steps.issue.outputs.number }}"
          body: |
            Adds a community-submitted agent from #${{ steps.issue.outputs.number }}.

            **Submitted by:** @${{ steps.issue.outputs.author }}
            **Approved by:** @${{ steps.issue.outputs.sender }}

            > This agent is added with `verified: false` and `source: 'community'`.
            > Review the changes to `agents.json` before merging.

            Closes #${{ steps.issue.outputs.number }}
          branch: "agent/issue-${{ steps.issue.outputs.number }}"
          labels: agent-submission
          delete-branch: true
