name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: 'true'

  verify-agents:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify agent data integrity
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node -e "
            if (!process.env.DATABASE_URL) {
              console.log('DATABASE_URL not set, skipping DB integrity check');
              process.exit(0);
            }
            const { neon } = require('@neondatabase/serverless');
            const sql = neon(process.env.DATABASE_URL);
            sql.query('SELECT COUNT(*) as total FROM agents').then(rows => {
              const total = Number(rows[0].total);
              console.log('Verified ' + total + ' agents in database');
              if (total < 1000) {
                console.error('WARNING: Agent count is suspiciously low: ' + total);
                process.exit(1);
              }
            }).catch(err => {
              console.error('DB check failed:', err);
              process.exit(1);
            });
          "
