<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bracketGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bracketGradR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="aGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="bracketGlow" x="-20%" y="-15%" width="140%" height="130%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Left angle bracket < -->
  <!-- Constructed as two thick lines meeting at a point on the left -->
  <path d="M 185 148 L 95 256 L 185 364"
        stroke="url(#bracketGradL)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"
        fill="none" filter="url(#bracketGlow)"/>

  <!-- Right angle bracket > -->
  <path d="M 327 148 L 417 256 L 327 364"
        stroke="url(#bracketGradR)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"
        fill="none" filter="url(#bracketGlow)"/>

  <!-- Inner "A" shape — sits between the brackets -->
  <!-- Left leg -->
  <path d="M 214 342 L 248 188 L 256 172 L 264 188 L 298 342"
        stroke="url(#aGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
  <!-- Crossbar -->
  <line x1="225" y1="284" x2="287" y2="284" stroke="url(#aGrad)" stroke-width="18" stroke-linecap="round"/>

  <!-- Small terminal dots on bracket ends — like cursor blinks -->
  <circle cx="185" cy="148" r="9" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="185" cy="364" r="9" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="327" cy="148" r="9" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="327" cy="364" r="9" fill="#c4b5fd" opacity="0.8"/>

  <!-- Subtle slash between — represents code (/) -->
  <!-- Actually a small forward-slash accent above, very faint -->
  <line x1="248" y1="134" x2="264" y2="108" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" stroke-opacity="0.4"/>
</svg>
