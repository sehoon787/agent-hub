<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="60%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <linearGradient id="orbitGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="orbitGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Outer orbital ellipse — tilted -->
  <ellipse cx="16" cy="16" rx="12" ry="4.25"
           stroke="url(#orbitGrad1)" stroke-width="0.9" fill="none"
           transform="rotate(-20 16 16)"/>

  <!-- Second orbital ellipse -->
  <ellipse cx="16" cy="16" rx="9" ry="3.1"
           stroke="url(#orbitGrad2)" stroke-width="0.7" fill="none"
           transform="rotate(55 16 16)" opacity="0.7"/>

  <!-- Agent dot 1 — top-right on orbit 1 -->
  <circle cx="24.5" cy="12.5" r="1.5" fill="#a78bfa"/>
  <circle cx="24.5" cy="12.5" r="0.75" fill="#ede9fe"/>

  <!-- Agent dot 2 — bottom-left on orbit 1 -->
  <circle cx="7.5" cy="19.5" r="1.2" fill="#8b5cf6"/>
  <circle cx="7.5" cy="19.5" r="0.6" fill="#c4b5fd"/>

  <!-- Agent dot 3 — upper-left on orbit 2 -->
  <circle cx="10" cy="11.5" r="1" fill="#7c3aed"/>
  <circle cx="10" cy="11.5" r="0.5" fill="#a78bfa"/>

  <!-- Central core -->
  <circle cx="16" cy="16" r="4.5" fill="url(#coreGrad)"/>
  <circle cx="16" cy="16" r="3.6" fill="#09090b"/>

  <!-- "A" letterform inside core -->
  <path d="M 14.2 18.8 L 15.6 13.1 L 16 12.3 L 16.4 13.1 L 17.8 18.8"
        stroke="#c4b5fd" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
  <line x1="14.7" y1="16.7" x2="17.3" y2="16.7" stroke="#c4b5fd" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Core border ring -->
  <circle cx="16" cy="16" r="4.5" stroke="#a78bfa" stroke-width="0.5" fill="none" stroke-opacity="0.5"/>
</svg>
